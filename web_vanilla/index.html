<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Voice Plugin - 测试面板</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; padding: 2rem; background: #f5f5f7; color: #333; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h1 { margin-top: 0; font-size: 1.5rem; border-bottom: 2px solid #eee; padding-bottom: 0.5rem; }
        .controls { display: flex; gap: 1rem; margin: 1.5rem 0; }
        button { padding: 0.8rem 1.5rem; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: opacity 0.2s; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        #btn-start { background: #007aff; color: white; }
        #btn-end { background: #ff3b30; color: white; }
        .status-box { padding: 1rem; border-radius: 8px; font-family: monospace; white-space: pre-wrap; word-break: break-all; margin-top: 1rem; background: #f8f9fa; border: 1px solid #dee2e6; min-height: 100px; }
        .tag { display: inline-block; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.8rem; font-weight: bold; }
        .tag.idle { background: #e9ecef; color: #495057; }
        .tag.active { background: #d4edda; color: #155724; }
        
        .chat-container { margin-top: 2rem; border-top: 2px dashed #eee; padding-top: 1rem; }
        .chat-window { height: 300px; overflow-y: auto; background: #282c34; color: #abb2bf; padding: 1rem; border-radius: 8px; font-family: 'Fira Code', monospace; font-size: 0.9rem; margin-bottom: 1rem; }
        .chat-msg { margin-bottom: 0.5rem; line-height: 1.4; }
        .chat-msg.user { color: #61afef; }
        .chat-msg.ai { color: #ffffff; }
        .chat-msg.filler { color: #ffffff; }
        .chat-msg.thought { color: #c678dd; font-size: 0.8rem; opacity: 0.8; margin-left: 1rem; border-left: 2px solid #555; padding-left: 0.5rem; }
        
        /* [V3.2] 状态颜色映射 */
        .relay-thought { color: #888; font-size: 0.8rem; font-style: italic; display: block; border-left: 2px solid #555; padding-left: 0.5rem; margin: 0.5rem 0; opacity: 0.8; }
        .relay-user { color: #61afef; } /* 蓝色: 用户输入 */
        .relay-ai { color: #ffffff; } /* 白色: 标签颜色 */
        .relay-chat { color: #ffffff; } /* 白色: 直接对话 */
        .relay-waiting { color: #ff6b6b; font-style: italic; } /* 红色: 任务处理中 (垫词) */
        .relay-idle { color: #ff85a2; } /* 粉色: 心跳/闲聊 */
        .relay-internal { color: #c678dd; font-weight: bold; } /* 紫色: 任务完成 */
        
        .chat-label { font-weight: bold; margin-right: 0.5rem; }
        .chat-input-group { display: flex; gap: 0.5rem; }
        .chat-input-group input { flex: 1; padding: 0.8rem; border: 1px solid #ccc; border-radius: 8px; outline: none; }
        .chat-input-group button { background: #34c759; color: white; }
    </style>
    <!-- 从 CDN 引入 ZEGO Express Web SDK -->
    <script src="https://unpkg.com/zego-express-engine-webrtc@3.5.0/zego-express-engine-webrtc.js"></script>
</head>
<body>
    <div class="container">
        <h1>Voice Plugin 调试终端 <span id="conn-state" class="tag idle">IDLE</span> <span id="user-id-display" style="float: right; font-size: 0.8rem; color: #888; font-weight: normal; margin-top: 0.5rem;">UserId: --</span></h1>
        
        <div class="controls">
            <button id="btn-start">📱 发起通话 (Start Call)</button>
            <button id="btn-end" disabled>📞 挂断通话 (End Call)</button>
        </div>

        <div>
            <strong>实时网关交互日志：</strong>
            <div id="log-console" class="status-box">--- 等待操作 ---</div>
            
            <audio id="remote-audio" autoplay style="display:none;"></audio>
        </div>

        <div class="chat-container">
            <h3>🚀 Fast Agent 文本仿真互动 (Text-MVP)</h3>
            <div id="chat-window" class="chat-window">
                <div class="chat-msg ai">[Jarvis]: 早上好，先生。有什么我可以帮您的？<br/><small style="opacity:0.5">(图例 - 白色:直接对话 | 红色:任务处理中 | 粉色:自动唤醒 | 紫色:任务汇报)</small></div>
            </div>
            <div class="chat-input-group">
                <input type="text" id="chat-input" placeholder="输入信息，体验 Fast Agent 响应逻辑..." />
                <button id="btn-send">发送</button>
            </div>
        </div>
    </div>

    <script src="./app.js"></script>
</body>
</html>
